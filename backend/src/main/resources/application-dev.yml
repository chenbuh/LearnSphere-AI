# 开发环境配置
# 敏感信息请在 application-secret.properties 中配置

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/learnsphere_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
  # 热更新配置
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      exclude: static/**,public/**,templates/**
    livereload:
      enabled: true

logging:
  level:
    com.learnsphere: debug

# Development fallback decryption key
# Keep this only for local/dev convenience.
jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:LearnSphere2026SecretKey}

# 语音引擎配置
voice-engine:
  enabled: ${VOICE_ENGINE_ENABLED:true}
  python-command: ${VOICE_ENGINE_PYTHON:python}
  script-path: ${VOICE_ENGINE_SCRIPT:edge_tts_server.py}
  host: ${VOICE_ENGINE_HOST:127.0.0.1}
  port: ${VOICE_ENGINE_PORT:5010}
  startup-timeout-seconds: ${VOICE_ENGINE_STARTUP_TIMEOUT:20}
  auto-install-deps: ${VOICE_ENGINE_AUTO_INSTALL:true}
  requirements-path: ${VOICE_ENGINE_REQUIREMENTS:requirements-voice.txt}
  install-timeout-seconds: ${VOICE_ENGINE_INSTALL_TIMEOUT:600}
  extra-python-path: ${VOICE_ENGINE_PYTHONPATH:}

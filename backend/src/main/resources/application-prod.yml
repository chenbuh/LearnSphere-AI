# 生产环境覆盖配置
# 敏感信息必须通过环境变量或 application-secret.properties 注入
# 推荐至少提供：DB_USERNAME、DB_PASSWORD、AI_API_KEY、JASYPT_PASSWORD

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:learnsphere_ai}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

ai:
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:qwen-turbo}

voice-engine:
  enabled: ${VOICE_ENGINE_ENABLED:false}
  python-command: ${VOICE_ENGINE_PYTHON:python3}

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

# Sa-Token 生产配置
sa-token:
  # token 名称
  token-name: satoken
  # token 有效期，单位秒
  timeout: 2592000
  # 临时有效期，指定时间内无操作则过期
  active-timeout: -1
  # 允许同一账号并发登录
  is-concurrent: true
  # 多端登录时共享 token
  is-share: true
  # token 风格
  token-style: uuid
  # 是否输出日志
  is-log: false
  # cookie 配置
  cookie:
    # 允许从 Cookie 读取 token
    is-cookie-read: true
    # 允许写入 Cookie
    is-cookie-write: true
    # cookie 作用域
    domain:
    # cookie 路径
    path: /
    # cookie 有效期，-1 表示浏览器关闭失效
    max-age: 2592000
    # SameSite 策略
    same-site: Lax
    # 仅在 HTTPS 下发送
    secure: true
    # 禁止 JavaScript 读取
    http-only: true

logging:
  level:
    com.learnsphere: info
    com.baomidou.mybatisplus: info
    cn.dev33.satoken: info

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

management:
  endpoint:
    health:
      show-details: when_authorized


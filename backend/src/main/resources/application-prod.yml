  api-key: sk-8b5df7e3d85442fd8e4ddb7c5204da48
  model: qwen-turbo

voice-engine:
  enabled: ${VOICE_ENGINE_ENABLED:false}
  python-command: ${VOICE_ENGINE_PYTHON:python3} # Linux 生产通常使用 python3

# In production, decryption key must come from environment variable.
jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
# Sa-Token 生产配置
sa-token:
  # token名称（同时也是cookie名称?
  token-name: satoken
  # token有效期（单位：?0?
  timeout: 2592000
  # token临时有效期（指定时间内无操作就为token过期）单位：?
  active-timeout: -1
  # 昐允同一账号并发登录
  is-concurrent: true
  # 在人登录同账号时，昐共用个token
  is-share: true
  # token风格
  token-style: uuid
  # 昐输出操作日志
  is-log: false
  # cookie配置
  cookie:
    # 昐在Cookie取token
    is-cookie-read: true
    # 昐在Cookie丆oken
    is-cookie-write: true
    # cookie的作用域
    domain: 
    # cookie的路?
    path: /
    # cookie的有效期（单位：秒）-1表示浏器关闍失效
    max-age: 2592000
    # 昐攌跨域
    same-site: Lax
    # 昐叜https下有?
    secure: true
    # 昐禁js操作cookie
    http-only: true

logging:
  level:
    com.learnsphere: info
    com.baomidou.mybatisplus: info
    cn.dev33.satoken: info

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

management:
  endpoint:
    health:
      show-details: when_authorized

server:
  port: 8080
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
    min-response-size: 1024
  servlet:
    context-path: /

spring:
  application:
    name: learnsphere-ai

  config:
    import: optional:file:./application-secret.properties,optional:file:./config/application-secret.properties,optional:file:./src/main/resources/application-secret.properties,optional:file:./backend/src/main/resources/application-secret.properties

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:learnsphere_ai}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  cache:
    type: caffeine
    caffeine:
      spec: initialCapacity=100,maximumSize=500,expireAfterWrite=10m

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

app:
  diagnostic:
    enabled: false
  cors:
    # 开发环境允许 localhost/127.0.0.1 以及局域网私有网段访问，方便手机真机调试；生产环境请通过 CORS_ALLOWED_ORIGINS 覆盖
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,https://localhost:5173,https://localhost:5174,https://localhost:5175,https://localhost:5176,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,http://127.0.0.1:5176,https://127.0.0.1:5173,https://127.0.0.1:5174,https://127.0.0.1:5175,https://127.0.0.1:5176,http://192.168.*:*,https://192.168.*:*,http://10.*:*,https://10.*:*,http://172.16.*:*,https://172.16.*:*,http://172.17.*:*,https://172.17.*:*,http://172.18.*:*,https://172.18.*:*,http://172.19.*:*,https://172.19.*:*,http://172.20.*:*,https://172.20.*:*,http://172.21.*:*,https://172.21.*:*,http://172.22.*:*,https://172.22.*:*,http://172.23.*:*,https://172.23.*:*,http://172.24.*:*,https://172.24.*:*,http://172.25.*:*,https://172.25.*:*,http://172.26.*:*,https://172.26.*:*,http://172.27.*:*,https://172.27.*:*,http://172.28.*:*,https://172.28.*:*,http://172.29.*:*,https://172.29.*:*,http://172.30.*:*,https://172.30.*:*,http://172.31.*:*,https://172.31.*:*}

jasypt:
  encryptor:
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

voice-engine:
  enabled: ${VOICE_ENGINE_ENABLED:false}
  python-command: ${VOICE_ENGINE_PYTHON:python}
  script-path: ${VOICE_ENGINE_SCRIPT:edge_tts_server.py}
  host: ${VOICE_ENGINE_HOST:127.0.0.1}
  port: ${VOICE_ENGINE_PORT:5010}
  startup-timeout-seconds: ${VOICE_ENGINE_STARTUP_TIMEOUT:20}
  auto-install-deps: ${VOICE_ENGINE_AUTO_INSTALL:true}
  requirements-path: ${VOICE_ENGINE_REQUIREMENTS:requirements-voice.txt}
  install-timeout-seconds: ${VOICE_ENGINE_INSTALL_TIMEOUT:600}
  extra-python-path: ${VOICE_ENGINE_PYTHONPATH:}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.learnsphere.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-statement-timeout: 5
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

logging:
  level:
    com.learnsphere: debug
    com.baomidou.mybatisplus: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

ai:
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:qwen-turbo}
  tutor:
    history:
      retention-days: 30
      auto-cleanup: true
    cleanup:
      cron: "0 0 2 * * ?"
    purge:
      cron: "0 0 3 ? * SUN"

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        ai.request.latency: true
        frontend.api.latency: true
        frontend.route.latency: true
        frontend.web_vital: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
        ai.request.latency: 0.5,0.9,0.95,0.99


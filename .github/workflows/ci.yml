name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  encoding-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan Chinese mojibake
        run: pwsh -File scripts/扫描中文乱码.ps1

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Backend tests
        if: ${{ hashFiles('backend/pom.xml') != '' }}
        working-directory: backend
        run: mvn -q test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend-vue/package-lock.json
            admin-vue/package-lock.json
      - name: Install & build (frontend-vue)
        if: ${{ hashFiles('frontend-vue/package.json') != '' }}
        working-directory: frontend-vue
        run: |
          npm ci --workspaces=false
          npm run build
      - name: Install & build (admin-vue)
        if: ${{ hashFiles('admin-vue/package.json') != '' }}
        working-directory: admin-vue
        run: |
          npm ci --workspaces=false
          npm run build
